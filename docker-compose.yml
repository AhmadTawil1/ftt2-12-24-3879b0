version: "3.9"

# OPM Objects:   O1 O2 O3 O4 O5 O6 O7 O8 O9 O10
#                O11 O12 O13 O14 O15 O16 O17 O18 O19 O20
#                O21 O22 O23 O24 O25 O26 O27 O28 O29 O30
#                O31 O32 O33 O34 O35 O36 O37 O38 O39 O40
#                O41 O42 O43 O44 O45 O46 O47 O48 O49 O50
#                O51 O52 O53 O54 O55 O56 O57 O58
#
# OPM Processes: P1 P2 P3 P4 P5 P6 P7 P8 P9 P10
#                P11 P12 P13 P14 P15 P16 P17 P18 P19 P20
#                P21 P22 P23 P24 P25 P26 P27 P28 P29 P30
#                P31 P32 P33 P34 P35 P36 P37 P38

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opm_backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./backend:/app
    networks:
      - opm_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opm_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - opm_network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: opm_db
    environment:
      POSTGRES_USER: opm
      POSTGRES_PASSWORD: opm_secret
      POSTGRES_DB: opm_db
    volumes:
      - opm_pgdata:/var/lib/postgresql/data
    networks:
      - opm_network
    restart: unless-stopped

networks:
  opm_network:
    driver: bridge

volumes:
  opm_pgdata: